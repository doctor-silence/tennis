# Upstream для backend
upstream backend {
    server localhost:3001;
    keepalive 64;
}

# HTTP Server - редирект на HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name onthecourt.ru www.onthecourt.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    return 301 https://$server_name$request_uri;
}

# HTTPS Server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name onthecourt.ru www.onthecourt.ru;

    ssl_certificate /etc/letsencrypt/live/onthecourt.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/onthecourt.ru/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # -------------------------------------------------------
    # SEO Static Pages
    # ВАЖНО: эти блоки должны быть ВЫШЕ location /
    # Папки: /var/www/tennispro/tennis/frontend/privacy/index.html
    #        /var/www/tennispro/tennis/frontend/terms/index.html
    #        /var/www/tennispro/tennis/frontend/news/index.html
    #        /var/www/tennispro/tennis/frontend/shop/index.html
    #        /var/www/tennispro/tennis/frontend/pro/index.html
    # -------------------------------------------------------

    location ^~ /privacy/ {
        root /var/www/tennispro/tennis/frontend;
        try_files $uri $uri/index.html =404;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    location ^~ /terms/ {
        root /var/www/tennispro/tennis/frontend;
        try_files $uri $uri/index.html =404;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    location ^~ /news/ {
        root /var/www/tennispro/tennis/frontend;
        try_files $uri $uri/index.html =404;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    location ^~ /shop/ {
        root /var/www/tennispro/tennis/frontend;
        try_files $uri $uri/index.html =404;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    location ^~ /pro/ {
        root /var/www/tennispro/tennis/frontend;
        try_files $uri $uri/index.html =404;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    location ^~ /rtt/ {
        root /var/www/tennispro/tennis/frontend;
        try_files $uri $uri/index.html =404;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    location ^~ /crm/ {
        root /var/www/tennispro/tennis/frontend;
        try_files $uri $uri/index.html =404;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # Favicon
    location = /favicon.svg {
        root /var/www/tennispro/tennis/frontend/dist;
        add_header Cache-Control "public, max-age=86400";
    }

    location = /favicon.ico {
        root /var/www/tennispro/tennis/frontend/dist;
        add_header Cache-Control "public, max-age=86400";
        access_log off;
    }

    # Robots.txt
    location = /robots.txt {
        alias /var/www/tennispro/tennis/frontend/dist/robots.txt;
        add_header Content-Type "text/plain; charset=utf-8";
        add_header Cache-Control "public, max-age=86400";
    }

    # Sitemap (serve sitemap.xml from frontend folder)
    location = /sitemap.xml {
        alias /var/www/tennispro/tennis/frontend/dist/sitemap.xml;
        add_header Content-Type "application/xml; charset=utf-8";
        add_header Cache-Control "public, max-age=86400";
    }

    # -------------------------------------------------------
    # Frontend SPA (React)
    # -------------------------------------------------------
    location / {
        root /var/www/tennispro/tennis/frontend/dist;
        try_files $uri $uri/ /index.html;

        location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # -------------------------------------------------------
    # Backend API
    # -------------------------------------------------------
    location /api {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # WebSocket
    location /socket.io {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 7d;
        proxy_send_timeout 7d;
        proxy_read_timeout 7d;
    }
}
