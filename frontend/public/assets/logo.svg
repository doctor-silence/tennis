<svg xmlns="http://www.w3.org/2000/svg" viewBox="-40 -25 600 270" fill="none">

  <!-- Ракетка: смещена левее (x=160), над рамкой с зазором -->
  <g transform="translate(160, 38) rotate(-38)">
    <clipPath id="rc">
      <ellipse cx="0" cy="0" rx="34" ry="42"/>
    </clipPath>
    <!-- Голова -->
    <ellipse cx="0" cy="0" rx="34" ry="42" fill="none" stroke="white" stroke-width="5"/>
    <!-- Струны -->
    <g clip-path="url(#rc)" stroke="white" stroke-width="1.8">
      <line x1="-27" y1="-42" x2="-27" y2="42"/>
      <line x1="-18" y1="-42" x2="-18" y2="42"/>
      <line x1="-9"  y1="-42" x2="-9"  y2="42"/>
      <line x1="0"   y1="-42" x2="0"   y2="42"/>
      <line x1="9"   y1="-42" x2="9"   y2="42"/>
      <line x1="18"  y1="-42" x2="18"  y2="42"/>
      <line x1="27"  y1="-42" x2="27"  y2="42"/>
      <line x1="-34" y1="-27" x2="34"  y2="-27"/>
      <line x1="-34" y1="-18" x2="34"  y2="-18"/>
      <line x1="-34" y1="-9"  x2="34"  y2="-9"/>
      <line x1="-34" y1="0"   x2="34"  y2="0"/>
      <line x1="-34" y1="9"   x2="34"  y2="9"/>
      <line x1="-34" y1="18"  x2="34"  y2="18"/>
      <line x1="-34" y1="27"  x2="34"  y2="27"/>
    </g>
    <!-- Горлышко -->
    <path d="M -9 40 Q -4 55 -3 63 L 3 63 Q 4 55 9 40" fill="none" stroke="white" stroke-width="4.5" stroke-linejoin="round"/>
    <!-- Ручка -->
    <rect x="-5" y="63" width="10" height="52" rx="3" fill="white"/>
  </g>

  <!-- Рамка: разрыв над ракеткой (x=160), зазор ±55 от центра ракетки -->
  <!-- Верх слева -->
  <line x1="-20" y1="88" x2="105" y2="88" stroke="white" stroke-width="5" stroke-linecap="square"/>
  <!-- Верх справа (после зазора) -->
  <line x1="215" y1="88" x2="540" y2="88" stroke="white" stroke-width="5" stroke-linecap="square"/>
  <!-- Низ -->
  <line x1="-20" y1="228" x2="540" y2="228" stroke="white" stroke-width="5" stroke-linecap="square"/>
  <!-- Левая вертикаль -->
  <line x1="-20" y1="88"  x2="-20" y2="228" stroke="white" stroke-width="5" stroke-linecap="square"/>
  <!-- Правая вертикаль -->
  <line x1="540" y1="88"  x2="540" y2="228" stroke="white" stroke-width="5" stroke-linecap="square"/>

  <!-- Текст NAKORTE внутри рамки -->
  <text
    x="260"
    y="190"
    text-anchor="middle"
    font-family="'Arial', 'Helvetica Neue', sans-serif"
    font-weight="700"
    font-size="90"
    letter-spacing="6"
    fill="white"
  >NAKORTE</text>

</svg>
